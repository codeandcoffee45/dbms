{% extends "base.html" %}

{% block content %}
<h2 style="font-family: 'Source Serif 4', serif; margin-bottom: 2rem;">Vehicle Service History</h2>

<table class="admin-table" >
    <thead>
        <tr>
            <th>Service-ID</th>
            <th>Mileage</th>
            <th>Labour Cost</th>
            <th>Total Cost</th>
            <th>Description</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>SRV-505</td>
            <td>12,400 km</td>
            <td>₹800</td>
            <td>₹3,200</td>
            <td>Brake Pad Replacement</td>
            <td>2026-03-24</td>
            <td><button class="btn-delete">Delete</button></td>
        </tr>
    </tbody>
</table>

<div class="form-container">
    <h3 style="font-family: 'Source Serif 4', serif; margin-top: 3rem;">Log New Service</h3>
    <form class="admin-form">
        <input type="text" placeholder="Service-ID">
        <input type="text" placeholder="Mileage">
        <input type="number" placeholder="Labour Cost">
        <textarea placeholder="Problem Description" style="width: 100%; padding: 10px; margin-top: 10px; background: var(--cream); border: 1px solid var(--slate); font-family: 'Inter', sans-serif;"></textarea>
        <button type="submit" class="btn-primary" style="margin-top: 10px;">Update Records</button>
    </form>
</div>
{% endblock %}
