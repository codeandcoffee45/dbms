{% extends "base.html" %}

{% block content %}
<h2 style="font-family: 'Source Serif 4', serif; margin-bottom: 2rem;">Payment Records</h2>

<table class="admin-table">
    <thead>
        <tr>
            <th>Pay-ID</th>
            <th>Transaction-ID</th>
            <th>Method</th>
            <th>Amount</th>
            <th>Date</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>PAY-202</td>
            <td>TXN_998877</td>
            <td>UPI</td>
            <td>₹4,500</td>
            <td>2026-03-24</td>
            <td><button class="btn-delete">Delete</button></td>
        </tr>
    </tbody>
</table>

<div class="form-container">
    <h3 style="font-family: 'Source Serif 4', serif; margin-top: 3rem;">Record New Payment</h3>
    <form class="admin-form">
        <input type="text" placeholder="Transaction ID">
        <select style="padding: 10px; border: 1px solid var(--slate); background: var(--cream);">
            <option>UPI</option>
            <option>Cash</option>
            <option>Card</option>
        </select>
        <input type="number" placeholder="Amount">
        <input type="date">
        <button type="submit" class="btn-primary">Save Payment</button>
    </form>
</div>
{% endblock %}
