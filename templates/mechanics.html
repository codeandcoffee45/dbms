{% extends "base.html" %}

{% block content %}
<h2 style="font-family: 'Source Serif 4', serif; margin-bottom: 2rem;">Mechanic Management</h2>

<table>
    <thead>
        <tr>
            <th>MEC-ID</th>
            <th>Name</th>
            <th>Specialization</th>
            <th>Experience</th>
            <th>Salary</th>
            <th>Phone</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        <tr>
            <td>MEC-101</td>
            <td>Ravi Kumar</td>
            <td>Engine Specialist</td>
            <td>5 Years</td>
            <td>₹25,000</td>
            <td>9876543210</td>
            <td><button class="btn-delete">Delete</button></td>
        </tr>
    </tbody>
</table>

<div class="form-container">
    <h3 style="font-family: 'Source Serif 4', serif; margin-top: 3rem;">Add New Mechanic</h3>
    <form class="admin-form">
        <input type="text" placeholder="Mechanic Name">
        <input type="text" placeholder="Specialization">
        <input type="number" placeholder="Experience (Yrs)">
        <input type="number" placeholder="Salary">
        <input type="text" placeholder="Phone">
        <button type="submit" class="btn-primary">Add to System</button>
    </form>
</div>
{% endblock %}
