{% extends "base.html" %}

{% block content %}
<div style="margin-bottom: 60px;">
    <h1 style="font-family: 'Source Serif 4', serif; font-size: 3.5rem; margin-bottom: 10px;">Executive Overview</h1>
    <p style="color: var(--slate); font-size: 1.1rem;">Vehicle Service Management — Internal Operations</p>
</div>

<div style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px;">
    <div class="stats-card">
        <p style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.7;">Active Units</p>
        <h2 style="font-size: 2.5rem; margin: 0;">24</h2>
    </div>
    <div class="stats-card">
        <p style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; opacity: 0.7;">Client Base</p>
        <h2 style="font-size: 2.5rem; margin: 0;">158</h2>
    </div>
    <div class="stats-card" style="background: var(--gold-accent);">
        <p style="text-transform: uppercase; font-size: 0.7rem; letter-spacing: 2px; color: var(--navy);">Revenue</p>
        <h2 style="font-size: 2.5rem; margin: 0; color: var(--navy);">₹42k</h2>
    </div>
</div>
{% endblock %}
